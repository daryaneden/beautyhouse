name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1 
        with:
          version: '1.8.2' 
          virtualenvs-create: true
          virtualenvs-in-project: true 

      - name: Cache Poetry virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Force sync lockfile metadata
        run: poetry lock

      - name: Install Dependencies
        run: poetry install --no-interaction --no-root

      - name: Run Ruff check
        run: poetry run python3 -m ruff check app

  unit-test: 
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1 
        with:
          version: '1.8.2' 
          virtualenvs-create: true
          virtualenvs-in-project: true 

      - name: Cache Poetry virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Force sync lockfile metadata
        run: poetry lock

      - name: Install Dependencies
        run: poetry install --no-interaction --no-root
      
      - name: Run Unit Tests
        run:
          poetry run python3 -m pytest tests/unit/


  integration-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    services:
      postgres:
        image: postgres:16.2
        env:
          POSTGRES_DB: beautyhouse-test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1 
        with:
          version: '1.8.2' 
          virtualenvs-create: true
          virtualenvs-in-project: true 

      - name: Cache Poetry virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Force sync lockfile metadata
        run: poetry lock

      - name: Install Dependencies
        run: poetry install --no-interaction --no-root

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Compose
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Run Integration Test
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql://postgres:password@localhost:5432/beautyhouse-test
        run:  
          poetry run python3 -m pytest

      - name: Docker Container Close
        run: docker compose -f docker-compose.test.yml down




  
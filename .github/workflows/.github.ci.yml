name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: snok/install-poetry@v1 # популярное действие для установки poetry
        with:
          version: '1.8.2' # укажите нужную версию
          virtualenvs-create: true
          virtualenvs-in-project: true # Ключевая настройка для создания .venv в папке проекта

      - name: Cache Poetry virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
      
      - name: Install Dependencies
        run:
          poetry install --no-interaction --no-root
        if: steps.cache-venv.outputs.cache-hit != 'true'
      #   run: |
      #     curl -sSL https://install.python-poetry.org | python3 -
      #     poetry install
      - name: Lint test
        run: poetry run ruff check app

  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    services:
      postgres:
        image: postgres:16.2
        env:
          POSTGRES_DB: beautyhouse-test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Настройка проверки здоровья для ожидания запуска
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry install
      - name: Run Unit Tests
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql://postgres:password@localhost:5432/beautyhouse-test
        run:
          python3 -m pytest tests/unit/


  integration-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry install
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build Docker Compose
        run: docker compose -f docker-compose.test.yml up -d --build
      - name: Run Integration Test
        run:  
          python3 -m pytest
      - name: Docker Container Close
        run: docker compose -f docker-compose.test.yml down


  
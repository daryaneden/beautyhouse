name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run:
          python3 -m pip install -r requirements.txt
      - name: Ruff
        run: ruff check app

  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    services:
      postgres:
        image: postgres:16.2
        env:
          POSTGRES_DB: beautyhouse-test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Настройка проверки здоровья для ожидания запуска
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run:
          python3 -m pip install -r requirements.txt
      - name: Run Unit Tests
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql://postgres:password@db-test:5432/beautyhouse-test
        run:
          python3 -m pytest tests/unit/


  integration-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run:
          python3 -m pip install -r requirements.txt
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build Docker Compose
        run: docker compose -f docker-compose.test.yml up -d --build
      - name: Run Integration Test
        run: 
          python3 -m pytest
      - name: Docker Container Close
        run: docker compose -f docker-compose.test.yml down


  
version: '3.9'

services:

  db-test:
    image: postgres:16.2
    restart: always
    container_name: beautyhouse-test
    # set shared memory limit when using docker compose
    shm_size: 128mb
    ports:
    - '5435:5432'
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: beautyhouse-test
